<!DOCTYPE html>
<html>

<head>

    <title>Inventory Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-dark bg-dark">

        <div class="container-fluid">

            <span class="navbar-brand">
                Inventory Management System
            </span>

            <button class="btn btn-danger"
                onclick="logout()">
                Logout
            </button>

        </div>

    </nav>

    <div class="container mt-4">

        <!-- Dashboard Cards -->

        <div class="row mb-4">

            <div class="col-md-6">

                <div class="card text-center">

                    <div class="card-body">

                        <h5>Total Products</h5>

                        <h2 id="totalProducts">0</h2>

                    </div>

                </div>

            </div>

            <div class="col-md-6">

                <div class="card text-center">

                    <div class="card-body">

                        <h5>Low Stock Items</h5>

                        <h2 id="lowStock">0</h2>

                    </div>

                </div>

            </div>

        </div>

        <!-- Add Product -->

        <h3>Add Product</h3>

        <div class="row mb-3">

            <div class="col-md-3">
                <input type="text"
                    id="productName"
                    placeholder="Product Name"
                    class="form-control">
            </div>

            <div class="col-md-2">
                <input type="text"
                    id="category"
                    placeholder="Category"
                    class="form-control">
            </div>

            <div class="col-md-2">
                <input type="number"
                    id="quantity"
                    placeholder="Quantity"
                    class="form-control">
            </div>

            <div class="col-md-2">
                <input type="number"
                    id="price"
                    placeholder="Price"
                    class="form-control">
            </div>

            <div class="col-md-3">

                <button class="btn btn-primary w-100"
                    onclick="addProduct()">

                    Add Product

                </button>

            </div>

        </div>

        <!-- Search -->

        <div class="row mb-3">

            <div class="col-md-6">

                <input type="text"
                    id="search"
                    placeholder="Search Product"
                    class="form-control">

            </div>

            <div class="row mb-3 align-items-center">

            <div class="col-md-6">

                <button class="btn btn-success">
                    Search
                </button>

                <button class="btn btn-warning">
                    Update
                </button>

                <button class="btn btn-danger">
                    Delete
                </button>

                <button class="btn btn-info">
                    Stock In
                </button>

                <button class="btn btn-secondary">
                    Stock Out
                </button>

            </div>

        </div>

        <!-- Product Table -->

        <table class="table table-bordered table-striped">

            <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="productTable">

            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

    <script>

        function logout() {

            window.location.href = "login.html";

        }

    </script>

</body>

</html>
